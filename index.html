    <style>

        .ndeshje-box { background: #0d1117; padding: 6px 8px; margin: 4px 0; border-radius: 6px; border: 1px solid #30363d; display: flex; flex-direction: column; gap: 4px; }
        .ndeshje-main-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; }

        .n-ora.live { color: #ff4500; animation: pulse 1.5s infinite; }
        .n-ekipet { font-size: 12px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; text-align: left; display: flex; align-items: center; gap: 8px;}
        .clickable-team { cursor: pointer; transition: color 0.2s; }
        .clickable-team:hover { color: #58a6ff; text-decoration: underline; }
        .qendra-rezultati { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .n-result-djathat { font-size: 13px; font-weight: 900; color: #fff; min-width: 40px; text-align: center; background: #21262d; padding: 4px 6px; border-radius: 4px; border: 1px solid #30363d; cursor: pointer; transition: 0.2s; }
        .n-result-djathat:hover { border-color: #58a6ff; color: #58a6ff; }
        .pulse-anim { animation: pulse 1.5s infinite; }
        .n-koef-grid { display: flex; gap: 4px; flex-shrink: 0; align-items: center;}
        .k-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; font-size: 11px; font-weight: 700; padding: 5px 0; width: 40px; text-align: center; cursor: pointer; transition: 0.2s; }

        .k-btn:hover { border-color: #58a6ff; }

        .btn-more:hover { background: #238636; }
        
        .ai-prediction-bar { background-color: #161b22; border: 1px dashed #2d6b43; border-radius: 4px; padding: 4px 8px; font-size: 10.5px; color: #8ba898; line-height: 1.2; text-align: left; margin-top: 2px;}
        .ai-prediction-bar.locked { background-color: #1c0e0e; border-color: #da3633; display: flex; align-items: center; gap: 8px;}
        
        .skedina-custom-row { background: rgba(88, 166, 255, 0.1); border-left: 3px solid #58a6ff; padding: 4px 8px; font-size: 11px; color: #c9d1d9; margin-top: 2px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .sk-val { font-weight: bold; color: #f2cc60; }
        .loading-container { text-align: center; padding: 40px 20px; width: 100%; display:flex; justify-content:center; align-items:center;}
        .loading-title { font-size: 15px; color: #8ba898; font-weight: bold;}
        .dot-anim::after { content: ''; animation: dotBlink 1.5s infinite steps(4, end); }
        @keyframes dotBlink { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 95%; max-width: 600px; padding: 20px; max-height: 85vh; overflow-y: auto; position: relative;}
        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 12px; margin-bottom: 15px; }
        .modal-title { font-size: 16px; font-weight: bold; margin: 0; text-transform: uppercase; letter-spacing: 0.5px;}
        .close-btn { background: none; border: none; color: #ff7b72; font-size: 28px; cursor: pointer; }
        
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px;}
        .tab-btn { background: transparent; color: #8ba898; border: 1px solid transparent; padding: 8px 15px; cursor: pointer; font-weight: bold; font-size: 13px; border-radius: 6px; }
        .tab-btn.active { background: #21262d; color: #58a6ff; border-color: #30363d; }
        .renditja-table { width: 100%; border-collapse: collapse; font-size: 12px; color: #c9d1d9; }
        .renditja-table th { background: #0d1117; color: #8ba898; padding: 8px; text-align: center; border-bottom: 1px solid #30363d; }
        .renditja-table td { padding: 8px; text-align: center; border-bottom: 1px solid #21262d; }
        .renditja-table tr:hover td { background: #21262d; }
        .team-left { text-align: left !important; font-weight: bold; color: #fff;}
        .form-box { display: inline-block; width: 15px; height: 15px; text-align: center; line-height: 15px; font-size: 9px; color: #fff; font-weight: bold; border-radius: 3px; margin: 0 1px; }
        .f-W { background: #238636; } .f-D { background: #d4af37; } .f-L { background: #da3633; }
        .hist-row { background: #0d1117; padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; gap: 10px;}
        .hist-left { flex: 1; }
        .hist-top { color: #8ba898; margin-bottom: 5px; font-size: 11px;}
        .hist-teams { font-weight: bold; font-size: 13px; margin-bottom: 6px; color: #fff;}
        
        .treg-box { margin-bottom: 16px; background: #0d1117; padding: 10px; border-radius: 6px; border: 1px solid #30363d;}
        .treg-title { color: #8ba898; font-weight: bold; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px dashed #30363d; padding-bottom: 4px;}
        .treg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 6px; }
        .treg-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 8px; border-radius: 4px; text-align: center; font-size: 12px; font-weight: bold; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s;}
        .treg-btn:hover { border-color: #58a6ff; }
        .treg-btn.selected { background: #f2cc60; color: #000; border-color: #f2cc60; }
        .treg-emri { font-weight: normal; font-size: 11px; color: inherit; margin-bottom: 2px;}
        
        .profile-section { display: flex; flex-direction: column; gap: 15px; }
        .profile-card { background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid #30363d; }
        .profile-label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 3px; }
        .profile-value { font-size: 16px; color: #fff; font-weight: bold; }
        .wallet-card { background: linear-gradient(135deg, #3a2c00 0%, #161b22 100%); border: 1px solid #d4af37; text-align: center; padding: 20px; border-radius: 10px; }
        .wallet-amount { font-size: 32px; color: #d4af37; font-weight: 900; display: block; margin-top: 5px; }
        .history-item { background: #21262d; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #238636; font-size: 13px;}
        
        .ppm-box { background: #0d1117; border: 1px solid #d4af37; padding: 15px; border-radius: 8px; margin-bottom: 12px; text-align: center;}
        .ppm-btn-buy { background: #d4af37; color: #000; border: none; padding: 10px 25px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .ppm-btn-buy:hover { transform: scale(1.03); }
        .ppm-btn-buy:disabled { cursor: not-allowed; transform: none; opacity: 0.5; }
        .checkout-box { background: #0a0e14; border: 1px solid #30363d; padding: 15px; border-radius: 8px; text-align: left; margin-top: 15px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; color: #8ba898; margin-bottom: 4px; font-weight: bold;}
        .card-input { width: 100%; box-sizing: border-box; background: #161b22; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 6px; font-size: 14px; outline: none; font-family: inherit;}
        .card-input:focus { border-color: #58a6ff; }
        
        .ticket-modal { text-align: center; padding: 20px; }

        @keyframes popIn { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .error-panel { background: #21262d; border-left: 4px solid #da3633; padding: 20px; text-align: center; border-radius: 6px; margin-top: 20px; color: #c9d1d9; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .footer-zone { padding: 20px; text-align: center; border-top: 1px solid #30363d; margin-top: auto; color: #8ba898; font-size: 12px; }
        .footer-links { margin-bottom: 10px; display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }
        .footer-links a { color: #58a6ff; text-decoration: none; cursor: pointer; font-weight: bold; transition: color 0.2s; }
        .footer-links a:hover { color: #fff; text-decoration: underline; }
        .legal-text { text-align: left; color: #c9d1d9; font-size: 13px; line-height: 1.6; }
        .legal-text h4 { color: #fff; margin-top: 20px; margin-bottom: 10px; }
        .legal-text ul { padding-left: 20px; margin-top: 5px; }
        .legal-text li { margin-bottom: 8px; }

        @keyframes skeleton-pulse { 0% { background-color: #161b22; } 50% { background-color: #21262d; } 100% { background-color: #161b22; } }
        .skeleton-match-card { height: 60px; width: 100%; border-radius: 8px; margin-bottom: 10px; background-color: #161b22; animation: skeleton-pulse 1.5s infinite ease-in-out; display: flex; align-items: center; padding: 0 15px; border: 1px solid #30363d; box-sizing: border-box; }
        .skeleton-line-short { height: 15px; width: 15%; border-radius: 4px; background-color: rgba(255, 255, 255, 0.05); margin-right: auto; }
        .skeleton-line-long { height: 15px; width: 40%; border-radius: 4px; background-color: rgba(255, 255, 255, 0.05); }

        .history-badge-win { background:rgba(63, 185, 80, 0.15); border:1px solid #3fb950; color:#3fb950; padding:8px; text-align:center; font-weight:bold; border-radius:4px; margin-top:5px; font-size:12px; }
        .history-badge-loss { background:rgba(218, 54, 51, 0.15); border:1px solid #da3633; color:#da3633; padding:8px; text-align:center; font-weight:bold; border-radius:4px; margin-top:5px; font-size:12px; }

        @media (max-width: 800px) {
            .sidebar-ligat { display: none; }
            .header-left { gap: 10px; }
            .header-right { gap: 10px; }
            .logo-text { font-size: 18px; }
            #searchInput { width: 90px; }
            .filtra-wrapper { padding: 10px; }
            .permbajtja { flex-direction: column; padding: 0;}
            .matches-area { padding: 5px; }
            .ndeshje-main-row { flex-wrap: wrap; gap: 5px;}
            .n-ekipet { width: 100%; text-align: left; order: -1; font-size: 13px;}
            .n-ora { font-size: 11px; min-width: 35px;}
            .qendra-rezultati { justify-content: flex-start; flex-grow: 0; }
            .n-koef-grid { justify-content: flex-end; flex-grow: 1;}
            .k-btn { width: 38px; font-size: 10px;}
            .n-result-djathat { font-size: 13px; min-width: 35px;}
            .auth-block { margin-right: 5px; }
            .auth-action { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="sticky-zone">
            <div class="top-header">
                <div class="header-left">
                    <div class="logo-wrapper" onclick="window.location.reload()" title="Soccer1X2 PRO">
                        <h1 class="logo-text">SOCCER1X2<span class="pro-badge">PRO</span></h1>
                    </div>
                    <div class="lang-container" style="margin-left: 10px;">
                        <button class="lang-btn" onclick="toggleLangDropdown()"><i class="fa-solid fa-earth-europe"></i> <span id="langText">EN</span></button>
                        <div class="lang-dropdown" id="langDropdown">
                            <div class="lang-option" onclick="ndryshoGjuhen('en')">🇬🇧 English</div>
                            <div class="lang-option" onclick="ndryshoGjuhen('sq')">🇦🇱 Shqip</div>
                            <div class="lang-option" onclick="ndryshoGjuhen('de')">🇩🇪 Deutsch</div>
                            <div class="lang-option" onclick="ndryshoGjuhen('fr')">🇫🇷 Français</div>
                            <div class="lang-option" onclick="ndryshoGjuhen('it')">🇮🇹 Italiano</div>
                        </div>
                    </div>
                    <div class="search-container"><input type="text" id="searchInput" placeholder="Search team..."></div>
                </div>
                <div class="header-right">
                    <div class="auth-block" id="authBlockUI">
                        <div class="auth-action" onclick="hapAuthModal('login')" id="lblLogin">Log In</div>
                        <div class="auth-or" id="lblOr">or</div>
                        <div class="auth-action" onclick="hapAuthModal('register')" id="lblReg">Register</div>
                    </div>
                    <div class="user-profile-icon" onclick="klikoIkoneNjeriut()"><i class="fa-solid fa-user"></i></div>
                </div>
            </div>

            <div class="filtra-wrapper">
                <div class="filtra-left">
                    <button class="btn-ppm-badge" onclick="verifikoAksesin(hapPremiumModal)"><span id="lblPPM">🔒 Pay Per Match</span> (<span id="ppmCount">0</span>)</button>
                    <span class="fire-badge" onclick="hapCreditBackInfo()"><i class="fa-solid fa-fire"></i> <span id="lblCB">100% CREDIT BACK</span></span>
                </div>
                <div class="filtra-qender">
                    <button class="filter-btn active" id="btnAll" onclick="ndryshoFiltra('Të Gjitha', this)">All Matches</button>
                    <button class="filter-btn" id="btnLive" onclick="ndryshoFiltra('LIVE', this)">LIVE</button>
                    <button class="filter-btn" id="btnTicket" onclick="verifikoAksesin(() => ndryshoFiltra('Skedina Ime', this))">My Ticket</button>
                    <button class="filter-btn" id="btnHistory" onclick="ndryshoFiltra('Historiku', this)">📊 Historiku PPM</button>
                </div>
                <div class="filtra-actions-right">
                    <i class="fa-solid fa-gem vip-diamond" id="ttVip" title="VIP Sub" onclick="verifikoAksesin(hapVipAbonim)"></i>
                    <i class="fa-brands fa-telegram action-sub-icon icon-tg" id="ttTg" title="Komuniteti" style="color:#0088cc; font-size:18px;" onclick="hapKomunitetin()"></i>

        function eshteBiletFituese(parashikimi, rezultatiNdeshjes) {
            try {
                if (!rezultatiNdeshjes || !rezultatiNdeshjes.includes("-")) return false;
                let parts = rezultatiNdeshjes.split("-");
                let g1 = parseInt(parts[0].trim());
                let g2 = parseInt(parts[1].trim());
                if(isNaN(g1) || isNaN(g2)) return false;

                let totalG = g1 + g2;
                let out = (g1 > g2) ? "1" : ((g1 === g2) ? "X" : "2");
                let p = parashikimi.toUpperCase().replace(/\s/g, ''); 

                if (p === "1" && out === "1") return true;
                if (p === "X" && out === "X") return true;
                if (p === "2" && out === "2") return true;
                if (p === "1X" && (out === "1" || out === "X")) return true;
                if (p === "X2" && (out === "X" || out === "2")) return true;
                if (p === "12" && (out === "1" || out === "2")) return true;
                
                if (p.includes("OVER")) {
                    let val = parseFloat(p.replace("OVER", ""));
                    if (totalG > val) return true;
                }
                if (p.includes("UNDER")) {
                    let val = parseFloat(p.replace("UNDER", ""));
                    if (totalG < val) return true;
                }
                if (p === "GG" || p === "BTTS") {
                    if (g1 > 0 && g2 > 0) return true;
                }
                if (p === "NG") {
                    if (g1 === 0 || g2 === 0) return true;
                }
                if (p === rezultatiNdeshjes.replace(/\s/g, "")) return true;
                return false;
            } catch(e) { return false; }
        }

        async function kryejLoginSimulim(isRegistering) {
            let emailInput = document.getElementById('authEmail').value;
            let passInput = document.getElementById('authPass').value;
            let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if(!emailRegex.test(emailInput) || !passInput) {
                document.getElementById('emailError').innerText = ui[gjuhaAktuale].invalidEmail;
                document.getElementById('emailError').style.display = 'block';
                return;
            }
            document.getElementById('emailError').style.display = 'none';

            let btn = document.getElementById('btnAuth');
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${ui[gjuhaAktuale].processing}`;
            btn.disabled = true;

            let endpoint = isRegistering ? '/api/register' : '/api/login';
            let payload = { email: emailInput, password: passInput, name: isRegistering ? (document.getElementById('authName').value || "Client") : "" };

            try {
                let res = await fetch('https://soccer1x2-api.onrender.com' + endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if(!res.ok) {
                    document.getElementById('emailError').innerText = "Gabim serveri / Timeout.";
                    document.getElementById('emailError').style.display = 'block';
                    btn.innerHTML = ui[gjuhaAktuale].finishAuth; btn.disabled = false; return;
                }

                let data = await res.json();
                if(data.sukses) {
                    isLogged = true; perdoruesi = data.perdoruesi;
                    if(document.getElementById('chkRemember').checked) {
                        localStorage.setItem('soccer_saved_email', emailInput);
                        localStorage.setItem('soccer_saved_pass', passInput);
                    }
                    ruajTeDhenat(); document.getElementById('authBlockUI').style.display = 'none'; mbyllModal(); vizatoNdeshjet(); 
                    if(isRegistering) { setTimeout(shfaqBonusModal, 500); } else { setTimeout(kontrolloFitoret, 1500); }
                } else {
                    let serverMsg = data.mesazhi || "";
                    if(serverMsg.includes("ekziston")) document.getElementById('emailError').innerText = ui[gjuhaAktuale].emailExists;
                    else if(serverMsg.includes("Llogaria")) document.getElementById('emailError').innerText = ui[gjuhaAktuale].errAuth;
                    else document.getElementById('emailError').innerText = serverMsg;
                    document.getElementById('emailError').style.display = 'block';
                    btn.innerHTML = ui[gjuhaAktuale].finishAuth; btn.disabled = false;
                }
            } catch(e) {
                document.getElementById('emailError').innerText = ui[gjuhaAktuale].errApi;
                document.getElementById('emailError').style.display = 'block';
                btn.innerHTML = ui[gjuhaAktuale].finishAuth; btn.disabled = false;
            }
        }

                            htmlNdeshjet += `<div class="ndeshje-box"><div class="ndeshje-main-row"><span class="${classOra}">${tekstiOra}</span><div class="n-ekipet"><span class="clickable-team" onclick="hapHistorineDheRenditjen('${n.ekipi_1_id}', '${safeEkipi1}', '${n.liga_id}', '${n.sezoni}', '${safeEkipi1}', '${safeEkipi2}')">${emriFinal}</span> - <span class="clickable-team" onclick="hapHistorineDheRenditjen('${n.ekipi_2_id}', '${safeEkipi2}', '${n.liga_id}', '${n.sezoni}', '${safeEkipi1}', '${safeEkipi2}')">${n.ekipi_2}</span></div><div class="qendra-rezultati">${rezultatiDjathatHtml}</div><div class="n-koef-grid"><button class="k-btn ${sel1}" onclick="shtoNeSkedine('${n.id}', '1', '${n.koef_1}')">${n.koef_1}</button><button class="k-btn ${selX}" onclick="shtoNeSkedine('${n.id}', 'X', '${n.koef_x}')">${n.koef_x}</button><button class="k-btn ${sel2}" onclick="shtoNeSkedine('${n.id}', '2', '${n.koef_2}')">${n.koef_2}</button></div><button class="btn-more" onclick="hapKoeficientet('${n.id}', '${safeEkipi1}', '${safeEkipi2}')"><i class="fa-solid fa-ellipsis"></i></button></div>${customSkedinaRow}${htmlAiBar}</div>`;
                        });
                    }
                }
            });
            container.innerHTML = ndeshjeGjeturTotal > 0 ? sidebarHtml + htmlNdeshjet + `</div>` : `<div style="text-align:center; color: #8b949e; padding: 40px; width: 100%;">${ui[gjuhaAktuale].empty}</div>`;
        }

        // ==========================================
        // HISTORIKU PA DATE & FILTRAT
        // ==========================================
        function ndryshoFiltra(f, b) { 
            filtriAktiv = f; 
            document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active')); 
            b.classList.add('active'); 
            
            if (f === 'Historiku') {
                ngarkoHistorikunNgaDB();
            } else {
                document.getElementById('calendarWrapper').style.display = 'flex';
                vizatoNdeshjet(); 
            }
        }

        async function ngarkoHistorikunNgaDB() {
            document.getElementById('calendarWrapper').style.display = 'none'; 
            const container = document.getElementById('rezultati');
            container.innerHTML = `<div class="loading-container"><div class="loading-title" style="color:#8ba898; font-size:15px;">${ui[gjuhaAktuale].loading}</div></div>`;
            try {
                let res = await fetch(`https://oqfhlyybwwkjbkvfpsxi.supabase.co/rest/v1/predictions?select=*&statusi=in.(FT,AET,PEN,AWD,WO)&order=id.desc&limit=50`, {
                    headers: {
                        "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xZmhseXlid3dramJrdmZwc3hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDU0NjksImV4cCI6MjA5NjU4MTQ2OX0.H1YFz3z9Ew3WofYbbvarP4V5rm99UjkY2mm1p2w4MBQ",
                        "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xZmhseXlid3dramJrdmZwc3hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDU0NjksImV4cCI6MjA5NjU4MTQ2OX0.H1YFz3z9Ew3WofYbbvarP4V5rm99UjkY2mm1p2w4MBQ"
                    }
                });
                let historiku = await res.json();
                
                if(!historiku || historiku.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding: 40px; width:100%; color:#8ba898;">${ui[gjuhaAktuale].noPurchases}</div>`;
                    return;
                }
                
                let h = `<div class="matches-area" style="width:100%; max-width:800px; margin:0 auto; padding:10px;">`;
                h += `<h3 style="color:#f2cc60; margin-bottom:15px; border-bottom:1px solid #30363d; padding-bottom:10px;">📊 ${ui[gjuhaAktuale].historyTab.toUpperCase()}</h3>`;
                
                historiku.forEach(n => {
                    let paraSakt = n.rezultati_sakt; let rezReal = n.rezultati || "";
                    let isWin = eshteBiletFituese(paraSakt, rezReal);
                    let historyBadge = isWin ? `<div class="history-badge-win">✅ ${ui[gjuhaAktuale].won} (${ui[gjuhaAktuale].prediction}: ${paraSakt})</div>` : (rezReal ? `<div class="history-badge-loss">❌ ${ui[gjuhaAktuale].lost} (${ui[gjuhaAktuale].prediction}: ${paraSakt} | ${ui[gjuhaAktuale].real}: ${rezReal})</div>` : `<div style="color:#8ba898; font-size:12px; margin-top:5px;">${ui[gjuhaAktuale].pendingResult}</div>`);
                    
                    let txtAnaliza = n.analiza_custom ? (n.analiza_custom[gjuhaAktuale] || n.analiza_custom.en) : "";
                    
                    h += `<div class="ndeshje-box" style="margin-bottom:15px;">
                            <div style="font-weight:bold; color:#fff; font-size:14px; margin-bottom:5px;">${n.ndeshja}</div>
                            <div style="color:#58a6ff; font-size:12px; margin-bottom:8px;">${ui[gjuhaAktuale].odds}: <b style="color:#f2cc60;">${n.koef_rez_sakt}</b></div>
                            <div class="ai-prediction-bar">📊 ${txtAnaliza}</div>
                            ${historyBadge}
                          </div>`;
                });
                h += `</div>`;
                container.innerHTML = h;
            } catch(e) { container.innerHTML = `<div style="text-align:center; padding: 40px; width:100%; color:#da3633;">Gabim në tërheqjen e historikut.</div>`; }
        }

        document.getElementById('searchInput').addEventListener('keyup', vizatoNdeshjet);

        // ==========================================
        // DETEKTIVI I HESHTUR (AUTO-SYNC)
        // ==========================================
        async function sinkronizoHeshtur() {
            if(!isLogged || !perdoruesi || !perdoruesi.email) return;
            try {
                let res = await fetch(`https://oqfhlyybwwkjbkvfpsxi.supabase.co/rest/v1/users?email=eq.${perdoruesi.email}`, {
                    headers: {
                        "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xZmhseXlid3dramJrdmZwc3hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDU0NjksImV4cCI6MjA5NjU4MTQ2OX0.H1YFz3z9Ew3WofYbbvarP4V5rm99UjkY2mm1p2w4MBQ",
                        "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xZmhseXlid3dramJrdmZwc3hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDU0NjksImV4cCI6MjA5NjU4MTQ2OX0.H1YFz3z9Ew3WofYbbvarP4V5rm99UjkY2mm1p2w4MBQ"
                    }
                });
                if (res.ok) {
                    let data = await res.json();
                    if(data && data.length > 0) {
                        let statusiRi = data[0];
                        let kaNdryshim = (statusiRi.isVip !== perdoruesi.isVip) || 
                                         (statusiRi.portofoli !== perdoruesi.portofoli) || 
                                         (JSON.stringify(statusiRi.blerjet) !== JSON.stringify(perdoruesi.blerjet));
                        if (kaNdryshim) {
                            let uBeVipTani = !perdoruesi.isVip && statusiRi.isVip;
                            perdoruesi = statusiRi;
                            ruajTeDhenat();
                            if(document.getElementById('modalOverlay').style.display === 'flex' && document.getElementById('modalTitle').innerText.includes(ui[gjuhaAktuale].profile)) hapProfilin();
                            if(filtriAktiv !== 'Historiku') vizatoNdeshjet();
                            if(uBeVipTani) alert(ui[gjuhaAktuale].successTitle);
                        }
                    }
                }
            } catch(e) {}
        }
        setInterval(sinkronizoHeshtur, 5000);
        window.addEventListener('focus', sinkronizoHeshtur);
    </script>
